############################################################
# Homebridge engine (package) — RUNTIME-config version (Phase 2c)
#
# Reads Homebridge URL / credentials / per-tile uniqueId+enabled from the
# hb_config component (id: hb_cfg), set via the on-device /setup page and stored
# in flash. Nothing here is compile-time device config anymore.
#
# HomeKit -> UI value mapping (ui_refresh expectations):
#   On (bool)            -> ha_state_tile* = "on"/"off"
#   Brightness (0-100)   -> tile*_brightness = Brightness * 2.55  (ui_refresh treats as 0-255)
#   Hue / ColorTemperature present -> tile*_supported_color_modes = "['hs'[,'color_temp']]"
############################################################

http_request:
  useragent: esphome/hb-panel
  timeout: 5s
  watchdog_timeout: 15s
  verify_ssl: false
  buffer_size_rx: 4096
  buffer_size_tx: 4096

json:

globals:
  - id: hb_token
    type: std::string
    restore_value: no
  - id: hb_auth_header
    type: std::string
    restore_value: no
  - id: hb_have_token
    type: bool
    restore_value: no
    initial_value: 'false'

# Poll one accessory (called per-tile). Note: url + enabled come from hb_cfg.
script:
  # ---- Login with the stored URL + credentials ----------------------------
  - id: hb_login
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(hb_cfg).url().empty();'
          then:
            - logger.log: "Homebridge not configured yet — open http://<device-ip>/setup"
          else:
            - http_request.post:
                url: !lambda 'return id(hb_cfg).url() + "/api/auth/login";'
                capture_response: true
                request_headers:
                  Content-Type: application/json
                body: !lambda |-
                  return std::string("{\"username\":\"") + id(hb_cfg).user() +
                         "\",\"password\":\"" + id(hb_cfg).pass() + "\"}";
                on_response:
                  then:
                    - script.execute:
                        id: hb_store_token
                        status: !lambda "return response->status_code;"
                        resp: !lambda "return body;"

  - id: hb_store_token
    parameters:
      status: int
      resp: string
    then:
      - lambda: |-
          if (status >= 200 && status < 300) {
            json::parse_json(resp, [](JsonObject root) -> bool {
              if (root["access_token"].is<const char*>()) {
                id(hb_token) = root["access_token"].as<std::string>();
                id(hb_auth_header) = "Bearer " + id(hb_token);
                id(hb_have_token) = true;
                return true;
              }
              return false;
            });
          }
          if (id(hb_have_token)) ESP_LOGI("hb", "login OK");
          else ESP_LOGE("hb", "login FAILED (http %d)", status);
      - if:
          condition:
            lambda: 'return id(hb_have_token);'
          then:
            - script.execute: hb_poll_all

  # ---- Poll all enabled tiles --------------------------------------------
  - id: hb_poll_all
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(hb_have_token) && !id(hb_cfg).url().empty();'
          then:
            - script.execute: hb_login
          else:
            - if:
                condition: { lambda: 'return id(hb_cfg).tile_enabled(1);' }
                then:
                  - http_request.get:
                      url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + id(hb_cfg).tile_uid(1);'
                      capture_response: true
                      max_response_buffer_size: 8192
                      request_headers:
                        Authorization: !lambda "return id(hb_auth_header).c_str();"
                        Accept-Encoding: identity
                      on_response:
                        then:
                          - lambda: |-
                              int sc = response->status_code;
                              if (sc < 200 || sc >= 300) { if (sc == 401) id(hb_have_token) = false; return; }
                              json::parse_json(body, [](JsonObject root) -> bool {
                                JsonObject v = root["values"];
                                if (v.isNull()) return false;
                                if (!v["On"].isNull()) id(ha_state_tile1).publish_state(v["On"].as<bool>() ? "on" : "off");
                                if (v["Brightness"].is<int>() || v["Brightness"].is<float>()) id(tile1_brightness).publish_state(v["Brightness"].as<float>() * 2.55f);
                                std::string m = "["; if (!v["Hue"].isNull()) m += "'hs'"; if (!v["ColorTemperature"].isNull()) { if (m.size() > 1) m += ","; m += "'color_temp'"; } m += "]";
                                id(tile1_supported_color_modes).publish_state(m);
                                return true;
                              });
                          - script.execute: ui_refresh
            - if:
                condition: { lambda: 'return id(hb_cfg).tile_enabled(2);' }
                then:
                  - http_request.get:
                      url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + id(hb_cfg).tile_uid(2);'
                      capture_response: true
                      max_response_buffer_size: 8192
                      request_headers:
                        Authorization: !lambda "return id(hb_auth_header).c_str();"
                        Accept-Encoding: identity
                      on_response:
                        then:
                          - lambda: |-
                              int sc = response->status_code;
                              if (sc < 200 || sc >= 300) { if (sc == 401) id(hb_have_token) = false; return; }
                              json::parse_json(body, [](JsonObject root) -> bool {
                                JsonObject v = root["values"];
                                if (v.isNull()) return false;
                                if (!v["On"].isNull()) id(ha_state_tile2).publish_state(v["On"].as<bool>() ? "on" : "off");
                                if (v["Brightness"].is<int>() || v["Brightness"].is<float>()) id(tile2_brightness).publish_state(v["Brightness"].as<float>() * 2.55f);
                                std::string m = "["; if (!v["Hue"].isNull()) m += "'hs'"; if (!v["ColorTemperature"].isNull()) { if (m.size() > 1) m += ","; m += "'color_temp'"; } m += "]";
                                id(tile2_supported_color_modes).publish_state(m);
                                return true;
                              });
                          - script.execute: ui_refresh
            - if:
                condition: { lambda: 'return id(hb_cfg).tile_enabled(3);' }
                then:
                  - http_request.get:
                      url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + id(hb_cfg).tile_uid(3);'
                      capture_response: true
                      max_response_buffer_size: 8192
                      request_headers:
                        Authorization: !lambda "return id(hb_auth_header).c_str();"
                        Accept-Encoding: identity
                      on_response:
                        then:
                          - lambda: |-
                              int sc = response->status_code;
                              if (sc < 200 || sc >= 300) { if (sc == 401) id(hb_have_token) = false; return; }
                              json::parse_json(body, [](JsonObject root) -> bool {
                                JsonObject v = root["values"];
                                if (v.isNull()) return false;
                                if (!v["On"].isNull()) id(ha_state_tile3).publish_state(v["On"].as<bool>() ? "on" : "off");
                                if (v["Brightness"].is<int>() || v["Brightness"].is<float>()) id(tile3_brightness).publish_state(v["Brightness"].as<float>() * 2.55f);
                                std::string m = "["; if (!v["Hue"].isNull()) m += "'hs'"; if (!v["ColorTemperature"].isNull()) { if (m.size() > 1) m += ","; m += "'color_temp'"; } m += "]";
                                id(tile3_supported_color_modes).publish_state(m);
                                return true;
                              });
                          - script.execute: ui_refresh
            - if:
                condition: { lambda: 'return id(hb_cfg).tile_enabled(4);' }
                then:
                  - http_request.get:
                      url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + id(hb_cfg).tile_uid(4);'
                      capture_response: true
                      max_response_buffer_size: 8192
                      request_headers:
                        Authorization: !lambda "return id(hb_auth_header).c_str();"
                        Accept-Encoding: identity
                      on_response:
                        then:
                          - lambda: |-
                              int sc = response->status_code;
                              if (sc < 200 || sc >= 300) { if (sc == 401) id(hb_have_token) = false; return; }
                              json::parse_json(body, [](JsonObject root) -> bool {
                                JsonObject v = root["values"];
                                if (v.isNull()) return false;
                                if (!v["On"].isNull()) id(ha_state_tile4).publish_state(v["On"].as<bool>() ? "on" : "off");
                                if (v["Brightness"].is<int>() || v["Brightness"].is<float>()) id(tile4_brightness).publish_state(v["Brightness"].as<float>() * 2.55f);
                                std::string m = "["; if (!v["Hue"].isNull()) m += "'hs'"; if (!v["ColorTemperature"].isNull()) { if (m.size() > 1) m += ","; m += "'color_temp'"; } m += "]";
                                id(tile4_supported_color_modes).publish_state(m);
                                return true;
                              });
                          - script.execute: ui_refresh
            - if:
                condition: { lambda: 'return id(hb_cfg).tile_enabled(5);' }
                then:
                  - http_request.get:
                      url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + id(hb_cfg).tile_uid(5);'
                      capture_response: true
                      max_response_buffer_size: 8192
                      request_headers:
                        Authorization: !lambda "return id(hb_auth_header).c_str();"
                        Accept-Encoding: identity
                      on_response:
                        then:
                          - lambda: |-
                              int sc = response->status_code;
                              if (sc < 200 || sc >= 300) { if (sc == 401) id(hb_have_token) = false; return; }
                              json::parse_json(body, [](JsonObject root) -> bool {
                                JsonObject v = root["values"];
                                if (v.isNull()) return false;
                                if (!v["On"].isNull()) id(ha_state_tile5).publish_state(v["On"].as<bool>() ? "on" : "off");
                                if (v["Brightness"].is<int>() || v["Brightness"].is<float>()) id(tile5_brightness).publish_state(v["Brightness"].as<float>() * 2.55f);
                                std::string m = "["; if (!v["Hue"].isNull()) m += "'hs'"; if (!v["ColorTemperature"].isNull()) { if (m.size() > 1) m += ","; m += "'color_temp'"; } m += "]";
                                id(tile5_supported_color_modes).publish_state(m);
                                return true;
                              });
                          - script.execute: ui_refresh
            - if:
                condition: { lambda: 'return id(hb_cfg).tile_enabled(6);' }
                then:
                  - http_request.get:
                      url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + id(hb_cfg).tile_uid(6);'
                      capture_response: true
                      max_response_buffer_size: 8192
                      request_headers:
                        Authorization: !lambda "return id(hb_auth_header).c_str();"
                        Accept-Encoding: identity
                      on_response:
                        then:
                          - lambda: |-
                              int sc = response->status_code;
                              if (sc < 200 || sc >= 300) { if (sc == 401) id(hb_have_token) = false; return; }
                              json::parse_json(body, [](JsonObject root) -> bool {
                                JsonObject v = root["values"];
                                if (v.isNull()) return false;
                                if (!v["On"].isNull()) id(ha_state_tile6).publish_state(v["On"].as<bool>() ? "on" : "off");
                                if (v["Brightness"].is<int>() || v["Brightness"].is<float>()) id(tile6_brightness).publish_state(v["Brightness"].as<float>() * 2.55f);
                                std::string m = "["; if (!v["Hue"].isNull()) m += "'hs'"; if (!v["ColorTemperature"].isNull()) { if (m.size() > 1) m += ","; m += "'color_temp'"; } m += "]";
                                id(tile6_supported_color_modes).publish_state(m);
                                return true;
                              });
                          - script.execute: ui_refresh

  # ---- Command: PUT a characteristic on the given uniqueId ----------------
  - id: hb_put
    mode: queued
    parameters:
      uid: string
      ctype: string
      value_json: string
    then:
      - http_request.send:
          method: PUT
          url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + uid;'
          request_headers:
            Content-Type: application/json
            Authorization: !lambda "return id(hb_auth_header).c_str();"
          body: !lambda 'return std::string("{\"characteristicType\":\"") + ctype + "\",\"value\":" + value_json + "}";'
      - delay: 250ms
      - script.execute: hb_poll_all

  - id: hb_put_hue_sat
    mode: queued
    parameters:
      uid: string
      hue: int
      sat: int
    then:
      - http_request.send:
          method: PUT
          url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + uid;'
          request_headers:
            Content-Type: application/json
            Authorization: !lambda "return id(hb_auth_header).c_str();"
          body: !lambda 'return std::string("{\"characteristicType\":\"Hue\",\"value\":") + to_string(hue) + "}";'
      - delay: 120ms
      - http_request.send:
          method: PUT
          url: !lambda 'return id(hb_cfg).url() + "/api/accessories/" + uid;'
          request_headers:
            Content-Type: application/json
            Authorization: !lambda "return id(hb_auth_header).c_str();"
          body: !lambda 'return std::string("{\"characteristicType\":\"Saturation\",\"value\":") + to_string(sat) + "}";'
      - delay: 250ms
      - script.execute: hb_poll_all

interval:
  - interval: 4s
    then:
      - script.execute: hb_poll_all
  - interval: 6h
    then:
      - script.execute: hb_login
