############################################################
# Homebridge link test  —  Cheap Yellow Display (ESP32-2432S028)
#
# Purpose: prove the ESP32 <-> Homebridge REST-API round-trip on YOUR
# hardware and network BEFORE porting the full tile UI. It has no LVGL /
# display code on purpose — it validates only the parts that can fail:
#   1) WiFi + SNTP time
#   2) Homebridge UI login  (POST /api/auth/login  ->  bearer token)
#   3) Control            (PUT  /api/accessories/{id} {characteristicType,value})
#   4) State read         (GET  /api/accessories/{id}  ->  values.<char>)
#
# You watch the result two ways:
#   - the onboard RGB LED  (see LED KEY below)
#   - ESPHome logs         (`esphome logs link-test.yaml`, USB or OTA)
#
# LED KEY:
#   RED    = no token yet, or the last request failed
#   GREEN  = logged in AND the test accessory reports ON
#   BLUE   = logged in AND the test accessory reports OFF
#
# Prereqs (see ../HOMEBRIDGE.md):
#   - Homebridge running with "Accessory Control" / insecure mode enabled
#   - A test accessory's uniqueId in HB_TEST_ACCESSORY_ID below
#   - esphome/secrets.yaml filled in (hb_username, hb_password, wifi_*, api key)
############################################################

substitutions:
  # Your Homebridge UI base URL. Prefer the LAN address over plain http:// —
  # TLS is heavy on the ESP32 and a wall panel should not depend on your
  # reverse proxy / internet. No trailing slash.
  #   LAN (recommended):        "http://192.168.1.50:8581"
  #   Public (works, heavier):  "https://hb.example.com"
  # This lives only in your local copy — keep the committed value as a placeholder.
  HB_BASE_URL: "http://homebridge.local:8581"

  # "form" = log in with hb_username / hb_password from secrets.yaml (default).
  # "none" = Homebridge UI authentication is disabled -> use /api/auth/noauth.
  HB_AUTH: "form"

  # uniqueId of the accessory to test with. Find it via:
  #   curl ${HB_BASE_URL}/api/accessories -H "Authorization: Bearer <token>"
  # (full walkthrough in ../HOMEBRIDGE.md). Pick a light or switch you can watch.
  HB_TEST_ACCESSORY_ID: "paste-a-uniqueId-here"

  # Which HomeKit characteristic to read/toggle. "On" for a light/switch/outlet.
  HB_TEST_CHAR: "On"

  POLL_INTERVAL: "5s"       # how often to read the accessory state
  REQUEST_TIMEOUT: "5s"     # per-request timeout

esphome:
  name: hb-link-test
  friendly_name: HB Link Test
  on_boot:
    priority: 600
    then:
      - script.execute: hb_update_led
      - script.execute: hb_login

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

# Optional — lets the ESPHome dashboard stream logs. Not used by Homebridge.
api:
  encryption:
    key: !secret smartdisplay_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "HB Link Test Fallback"
    password: !secret wifi_ap_password

captive_portal:

# NTP instead of Home Assistant time (there is no HA in a Homebridge setup).
time:
  - platform: sntp
    id: sntp_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org

json:

http_request:
  useragent: esphome/hb-link-test
  timeout: ${REQUEST_TIMEOUT}
  watchdog_timeout: 15s
  # LAN + plain http:// needs no TLS. For an https:// base_url the ESP32 would
  # verify against Mozilla roots; set this false only if you hit cert issues.
  verify_ssl: false

globals:
  - id: hb_token
    type: std::string
    restore_value: no
  - id: hb_have_token
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: hb_last_ok
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: hb_test_on
    type: bool
    restore_value: no
    initial_value: 'false'

# Onboard RGB LED (active-low) used purely as a status indicator.
output:
  - platform: ledc
    id: out_red
    pin: GPIO4
    inverted: true
  - platform: ledc
    id: out_green
    pin: GPIO16
    inverted: true
  - platform: ledc
    id: out_blue
    pin: GPIO17
    inverted: true

light:
  - platform: rgb
    id: status_led
    name: "Status LED"
    red: out_red
    green: out_green
    blue: out_blue
    restore_mode: ALWAYS_OFF

script:
  # --- Log in and store the bearer token -------------------------------------
  - id: hb_login
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return std::string("${HB_AUTH}") == "none";'
          then:
            - http_request.post:
                url: ${HB_BASE_URL}/api/auth/noauth
                capture_response: true
                on_response:
                  then:
                    - script.execute:
                        id: hb_store_token
                        status: !lambda 'return response->status_code;'
          else:
            - http_request.post:
                url: ${HB_BASE_URL}/api/auth/login
                capture_response: true
                json:
                  username: !secret hb_username
                  password: !secret hb_password
                on_response:
                  then:
                    - script.execute:
                        id: hb_store_token
                        status: !lambda 'return response->status_code;'

  - id: hb_store_token
    parameters:
      status: int
    then:
      - lambda: |-
          if (status == 200) {
            json::parse_json(body, [](JsonObject root) -> bool {
              if (root["access_token"].is<const char*>()) {
                id(hb_token) = root["access_token"].as<std::string>();
                id(hb_have_token) = true;
                return true;
              }
              return false;
            });
          }
          if (id(hb_have_token)) {
            ESP_LOGI("homebridge", "Login OK, token acquired");
          } else {
            ESP_LOGE("homebridge", "Login FAILED (http %d)", status);
          }
      - script.execute: hb_update_led
      - if:
          condition:
            lambda: 'return id(hb_have_token);'
          then:
            - script.execute: hb_poll

  # --- Read the test accessory's state ---------------------------------------
  - id: hb_poll
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(hb_have_token);'
          then:
            - script.execute: hb_login
          else:
            - http_request.get:
                url: ${HB_BASE_URL}/api/accessories/${HB_TEST_ACCESSORY_ID}
                capture_response: true
                request_headers:
                  Authorization: !lambda 'return "Bearer " + id(hb_token);'
                on_response:
                  then:
                    - lambda: |-
                        if (response->status_code == 200) {
                          bool parsed = json::parse_json(body, [](JsonObject root) -> bool {
                            JsonObject values = root["values"];
                            if (values.isNull()) return false;
                            JsonVariant v = values["${HB_TEST_CHAR}"];
                            if (v.is<bool>())      id(hb_test_on) = v.as<bool>();
                            else if (v.is<int>())  id(hb_test_on) = (v.as<int>() != 0);
                            else return false;
                            return true;
                          });
                          id(hb_last_ok) = parsed;
                          ESP_LOGI("homebridge", "poll ${HB_TEST_CHAR}=%d (ok=%d)",
                                   id(hb_test_on) ? 1 : 0, parsed ? 1 : 0);
                        } else {
                          id(hb_last_ok) = false;
                          if (response->status_code == 401) id(hb_have_token) = false; // token expired
                          ESP_LOGE("homebridge", "poll failed (http %d)", response->status_code);
                        }
                    - script.execute: hb_update_led

  # --- Flip the test accessory (proves control) ------------------------------
  - id: hb_toggle
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(hb_have_token);'
          then:
            - script.execute: hb_login
          else:
            - http_request.send:
                method: PUT
                url: ${HB_BASE_URL}/api/accessories/${HB_TEST_ACCESSORY_ID}
                capture_response: true
                request_headers:
                  Content-Type: application/json
                  Authorization: !lambda 'return "Bearer " + id(hb_token);'
                body: !lambda |-
                  std::string v = id(hb_test_on) ? "false" : "true";  // send the opposite
                  return std::string("{\"characteristicType\":\"${HB_TEST_CHAR}\",\"value\":") + v + "}";
                on_response:
                  then:
                    - lambda: |-
                        ESP_LOGI("homebridge", "toggle PUT -> http %d", response->status_code);
                        if (response->status_code == 401) id(hb_have_token) = false;
                    # re-read the real state from Homebridge after a short beat
                    - delay: 300ms
                    - script.execute: hb_poll

  # --- Drive the status LED from current state -------------------------------
  - id: hb_update_led
    then:
      - lambda: |-
          float r = 0, g = 0, b = 0;
          if (!id(hb_have_token) || !id(hb_last_ok)) { r = 1; }   // red   = problem
          else if (id(hb_test_on))                   { g = 1; }   // green = ON
          else                                       { b = 1; }   // blue  = OFF
          auto call = id(status_led).turn_on();
          call.set_rgb(r, g, b);
          call.set_brightness(0.6f);
          call.perform();

interval:
  - interval: ${POLL_INTERVAL}
    then:
      - script.execute: hb_poll
  # Refresh the token well before the Homebridge UI session (default 8h) expires.
  - interval: 6h
    then:
      - script.execute: hb_login

# Dashboard buttons so you can trigger each step by hand while watching logs.
button:
  - platform: template
    name: "Homebridge: Login"
    on_press: { then: [ script.execute: hb_login ] }
  - platform: template
    name: "Homebridge: Poll state"
    on_press: { then: [ script.execute: hb_poll ] }
  - platform: template
    name: "Homebridge: Toggle test accessory"
    on_press: { then: [ script.execute: hb_toggle ] }

switch:
  - platform: restart
    name: "Restart"
